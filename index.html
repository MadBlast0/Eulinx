<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eulinx</title>

    <!-- Font preloads for performance -->
    <link rel="preload" href="/fonts/GeistVariable.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/JetBrainsMono-Regular.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Boot cloak: hides blank white flash until theme is applied -->
    <style>
      #eulinx-boot-cloak {
        position: fixed;
        inset: 0;
        background: #0F1115;
        z-index: 9999;
        transition: opacity 200ms ease;
        pointer-events: none;
      }
      #eulinx-boot-cloak[data-hidden] {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="eulinx-boot-cloak"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
